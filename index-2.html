<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SalesCommand · India</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0f1e;font-family:'DM Sans','Segoe UI',sans-serif;color:#e2e8f0;min-height:100vh}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:#0d1322}
    ::-webkit-scrollbar-thumb{background:#334155;border-radius:4px}
    input,select,button{font-family:'DM Sans','Segoe UI',sans-serif}
    input::placeholder{color:#475569}
    .tab-btn{background:none;border:none;padding:12px 14px;font-size:12px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.2s}
    .tab-btn.active{color:#818cf8;border-bottom-color:#818cf8;font-weight:700}
    .tab-btn:not(.active){color:#64748b}
    .card{background:#0d1322;border:1px solid #1e2a4a;border-radius:12px;padding:14px;margin-bottom:10px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .inp{width:100%;background:#1e2a4a;border:1px solid #334155;border-radius:8px;padding:8px 12px;color:#e2e8f0;font-size:13px;outline:none;box-sizing:border-box;margin-bottom:8px}
    .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer}
    .btn-ghost{background:none;border:none;color:#6366f1;font-size:13px;cursor:pointer;padding:0;margin-bottom:14px}
    .stat-card{background:#0d1322;border:1px solid #1e2a4a;border-radius:12px;padding:16px 14px}
    .tag{font-size:10px;background:#1e2a4a;color:#818cf8;border-radius:4px;padding:1px 6px}
    .alert-border-red{border-color:#7f1d1d !important}
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const {useState,useEffect,useRef,createElement:h} = React;

const fmt = n => "₹"+Number(n).toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtI = n => "₹"+Number(n).toLocaleString("en-IN");
const baseP = (mrp,gst) => mrp/(1+gst/100);
const gstAmt = (mrp,gst) => mrp - baseP(mrp,gst);
const GST_SLABS = [5,12,18,28];

const PRODUCTS = [
  {id:"P001",name:"Premium Coffee Blend",cat:"Beverages",mrp:850,unit:"per kg",sku:"BEV-001",gst:18},
  {id:"P002",name:"Green Tea Sachets",cat:"Beverages",mrp:220,unit:"per box/50",sku:"BEV-002",gst:5},
  {id:"P003",name:"Mineral Water 1L",cat:"Beverages",mrp:20,unit:"per bottle",sku:"BEV-003",gst:18},
  {id:"P004",name:"Energy Drink 250ml",cat:"Beverages",mrp:110,unit:"per can",sku:"BEV-004",gst:28},
  {id:"P005",name:"Whole Wheat Biscuits",cat:"Snacks",mrp:60,unit:"per pack",sku:"SNK-001",gst:12},
  {id:"P006",name:"Potato Chips 150g",cat:"Snacks",mrp:40,unit:"per bag",sku:"SNK-002",gst:12},
  {id:"P007",name:"Cashew Nuts 500g",cat:"Snacks",mrp:550,unit:"per pack",sku:"SNK-003",gst:5},
  {id:"P008",name:"Basmati Rice 5kg",cat:"Staples",mrp:480,unit:"per bag",sku:"STP-001",gst:5},
  {id:"P009",name:"Cooking Oil 1L",cat:"Staples",mrp:180,unit:"per bottle",sku:"STP-002",gst:5},
  {id:"P010",name:"Sugar 1kg",cat:"Staples",mrp:48,unit:"per pack",sku:"STP-003",gst:5},
  {id:"P011",name:"Ceramic Mugs",cat:"Homeware",mrp:350,unit:"per piece",sku:"HW-001",gst:12},
  {id:"P012",name:"Glass Bottles 500ml",cat:"Homeware",mrp:120,unit:"per piece",sku:"HW-002",gst:18},
  {id:"P013",name:"Hand Soap 300ml",cat:"Personal Care",mrp:95,unit:"per bottle",sku:"PC-001",gst:18},
  {id:"P014",name:"Shampoo 200ml",cat:"Personal Care",mrp:175,unit:"per bottle",sku:"PC-002",gst:18},
  {id:"P015",name:"Toothpaste 100g",cat:"Personal Care",mrp:85,unit:"per tube",sku:"PC-003",gst:18},
];
const CATS = ["All",...[...new Set(PRODUCTS.map(p=>p.cat))]];

const INIT = {
  orders:[
    {id:"ORD-001",client:"Metro Kirana",amount:42000,status:"delivered",date:"2026-05-20",items:[]},
    {id:"ORD-002",client:"City Mart",amount:18500,status:"pending",date:"2026-05-21",items:[]},
    {id:"ORD-003",client:"QuickShop",amount:31000,status:"processing",date:"2026-05-22",items:[]},
    {id:"ORD-004",client:"Westside Foods",amount:9200,status:"delivered",date:"2026-05-19",items:[]},
    {id:"ORD-005",client:"Harbor General",amount:56000,status:"delivered",date:"2026-05-18",items:[]},
  ],
  cash:[
    {id:"CASH-001",client:"Metro Kirana",amount:38000,date:"2026-05-20",verified:true},
    {id:"CASH-002",client:"Harbor General",amount:56000,date:"2026-05-21",verified:true},
    {id:"CASH-003",client:"QuickShop",amount:12000,date:"2026-05-22",verified:false},
  ],
  cheques:[
    {id:"CHQ-001",client:"City Mart",amount:45000,date:"2026-05-19",due:"2026-06-01",status:"pending"},
    {id:"CHQ-002",client:"Westside Foods",amount:22000,date:"2026-05-20",due:"2026-05-30",status:"cleared"},
  ],
  damages:[
    {id:"DMG-001",client:"QuickShop",product:"Glass Bottles x12",value:1440,date:"2026-05-21",resolved:false},
    {id:"DMG-002",client:"Metro Kirana",product:"Ceramic Mugs x6",value:2100,date:"2026-05-20",resolved:true},
  ],
  returns:[
    {id:"RET-001",client:"City Mart",product:"Premium Coffee x24",value:4800,date:"2026-05-22",reason:"Wrong item"},
  ],
  gps:[
    {time:"08:15",loc:"Depot",lat:19.076,lng:72.877,act:"Start"},
    {time:"09:30",loc:"Metro Kirana",lat:19.082,lng:72.885,act:"Delivery"},
    {time:"11:00",loc:"City Mart",lat:19.090,lng:72.868,act:"Collection"},
    {time:"13:20",loc:"QuickShop",lat:19.070,lng:72.880,act:"Delivery"},
    {time:"15:45",loc:"Harbor General",lat:19.095,lng:72.860,act:"Delivery"},
    {time:"17:00",loc:"Depot",lat:19.076,lng:72.877,act:"End"},
  ],
  targets:{monthly:800000,collected:524000},
};

const sColor = s=>({delivered:"#22c55e",pending:"#f59e0b",processing:"#3b82f6",cleared:"#22c55e"}[s]||"#94a3b8");

function App(){
  const [tab,setTab]=useState("Dashboard");
  const [data,setData]=useState(INIT);
  const [aiChat,setAiChat]=useState([]);
  const [aiInput,setAiInput]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [oMode,setOMode]=useState(null);
  const [vOrder,setVOrder]=useState(null);
  const [oClient,setOClient]=useState("");
  const [oGstin,setOGstin]=useState("");
  const [oStatus,setOStatus]=useState("pending");
  const [oItems,setOItems]=useState([]);
  const [catF,setCatF]=useState("All");
  const [pSearch,setPSearch]=useState("");
  const chatRef=useRef(null);

  useEffect(()=>{if(tab==="AI Insights"&&aiChat.length===0)doAutoInsight();},[tab]);
  useEffect(()=>{chatRef.current?.scrollIntoView({behavior:"smooth"});},[aiChat]);

  const totOrd=data.orders.reduce((s,o)=>s+o.amount,0);
  const totCash=data.cash.reduce((s,c)=>s+c.amount,0);
  const totCheq=data.cheques.reduce((s,c)=>s+c.amount,0);
  const totDmg=data.damages.reduce((s,d)=>s+d.value,0);
  const totRet=data.returns.reduce((s,r)=>s+r.value,0);
  const colRate=Math.round(((totCash+totCheq)/totOrd)*100);
  const pct=Math.round((data.targets.collected/data.targets.monthly)*100);

  const oTaxable=oItems.reduce((s,i)=>s+baseP(i.price,i.gst)*i.qty,0);
  const oGst=oItems.reduce((s,i)=>s+gstAmt(i.price,i.gst)*i.qty,0);
  const oTotal=oItems.reduce((s,i)=>s+i.price*i.qty,0);
  const oMrp=oItems.reduce((s,i)=>s+i.mrp*i.qty,0);
  const oDisc=oMrp-oTotal;

  const gstBreak=GST_SLABS.map(slab=>{
    const si=oItems.filter(i=>i.gst===slab);
    const tax=si.reduce((s,i)=>s+baseP(i.price,i.gst)*i.qty,0);
    const g=si.reduce((s,i)=>s+gstAmt(i.price,i.gst)*i.qty,0);
    return{slab,tax,cgst:g/2,sgst:g/2,total:g};
  }).filter(g=>g.total>0);

  const addItem=p=>{
    setOItems(prev=>{
      const ex=prev.find(i=>i.pid===p.id);
      if(ex)return prev.map(i=>i.pid===p.id?{...i,qty:i.qty+1}:i);
      return[...prev,{pid:p.id,name:p.name,sku:p.sku,mrp:p.mrp,price:p.mrp,qty:1,unit:p.unit,gst:p.gst}];
    });
  };
  const updItem=(pid,f,v)=>setOItems(prev=>prev.map(i=>i.pid===pid?{...i,[f]:parseFloat(v)||0}:i));
  const remItem=pid=>setOItems(prev=>prev.filter(i=>i.pid!==pid));

  const saveOrder=()=>{
    if(!oClient.trim()||oItems.length===0)return;
    const o={id:`ORD-${String(data.orders.length+1).padStart(3,"0")}`,client:oClient,gstin:oGstin,amount:Math.round(oTotal),status:oStatus,date:new Date().toISOString().slice(0,10),items:oItems,taxable:oTaxable,gstTotal:oGst};
    setData(prev=>({...prev,orders:[o,...prev.orders]}));
    setOMode(null);setOClient("");setOGstin("");setOItems([]);setOStatus("pending");
  };

  const filtP=PRODUCTS.filter(p=>(catF==="All"||p.cat===catF)&&(p.name.toLowerCase().includes(pSearch.toLowerCase())||p.sku.toLowerCase().includes(pSearch.toLowerCase())));

  const ctx=()=>`Sales: Arjun Sharma, Mumbai North, India
Orders: ${data.orders.length}, total ${fmtI(totOrd)}
Cash: ${fmtI(totCash)} (${data.cash.filter(c=>!c.verified).length} unverified)
Cheques: ${fmtI(totCheq)} (${data.cheques.filter(c=>c.status==="pending").length} pending)
Collection Rate: ${colRate}%
Target: ${fmtI(data.targets.monthly)}, Collected: ${fmtI(data.targets.collected)} (${pct}%)
Damages: ${data.damages.length} (${data.damages.filter(d=>!d.resolved).length} unresolved)
Returns: ${data.returns.length}`;

  const doAutoInsight=async()=>{
    setAiLoading(true);
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"You are an AI sales manager for Indian FMCG distribution. Give bullet-point insights, flag anomalies, suggest improvements. Use Indian Rupees. Under 200 words.",messages:[{role:"user",content:"Analyse:\n"+ctx()}]})});
      const d=await r.json();
      setAiChat([{role:"assistant",content:d.content?.map(b=>b.text||"").join("")||"No insights.",auto:true}]);
    }catch{setAiChat([{role:"assistant",content:"⚠️ AI unavailable.",auto:true}]);}
    setAiLoading(false);
  };

  const sendAi=async()=>{
    if(!aiInput.trim()||aiLoading)return;
    const msg=aiInput.trim();setAiInput("");
    const hist=[...aiChat,{role:"user",content:msg}];
    setAiChat(hist);setAiLoading(true);
    try{
      const msgs=hist.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.content}));
      if(msgs[0]?.role==="assistant")msgs.unshift({role:"user",content:ctx()});
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"AI sales manager India. "+ctx(),messages:msgs})});
      const d=await r.json();
      setAiChat(prev=>[...prev,{role:"assistant",content:d.content?.map(b=>b.text||"").join("")||"No response."}]);
    }catch{setAiChat(prev=>[...prev,{role:"assistant",content:"⚠️ Error."}]);}
    setAiLoading(false);
  };

  const TABS=["Dashboard","Orders","Cash & Cheques","Damages & Returns","GPS Tracker","AI Insights"];

  return h("div",{style:{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#0a0f1e",minHeight:"100vh",color:"#e2e8f0"}},
    // Header
    h("div",{style:{background:"linear-gradient(135deg,#0f172a,#1e1b4b)",borderBottom:"1px solid #1e2a4a",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}},
      h("div",{style:{display:"flex",alignItems:"center",gap:12}},
        h("div",{style:{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}},"📊"),
        h("div",null,h("div",{style:{fontWeight:700,fontSize:17}},"SalesCommand"),h("div",{style:{fontSize:11,color:"#64748b"}},"AI-Powered Field Sales Manager · India"))
      ),
      h("div",{style:{display:"flex",alignItems:"center",gap:8}},
        h("div",{style:{width:8,height:8,borderRadius:"50%",background:"#22c55e",boxShadow:"0 0 8px #22c55e"}}),
        h("div",{style:{fontSize:13,color:"#94a3b8"}},"Arjun Sharma")
      )
    ),
    // Tabs
    h("div",{style:{display:"flex",padding:"0 16px",background:"#0d1322",borderBottom:"1px solid #1e2a4a",overflowX:"auto"}},
      TABS.map(t=>h("button",{key:t,className:"tab-btn"+(tab===t?" active":""),onClick:()=>{setTab(t);setOMode(null);}},t))
    ),
    // Content
    h("div",{style:{padding:"20px 16px",maxWidth:900,margin:"0 auto"}},
      tab==="Dashboard"&&h(Dashboard,{data,totOrd,totCash,totCheq,totDmg,totRet,colRate,pct,fmtI}),
      tab==="Orders"&&oMode===null&&h(OrdersList,{data,setData,setOMode,setVOrder,fmtI,fmt,sColor}),
      tab==="Orders"&&oMode==="view"&&h(OrderView,{order:vOrder,setOMode,fmt,fmtI,sColor,baseP,gstAmt,GST_SLABS}),
      tab==="Orders"&&oMode==="new"&&h(OrderNew,{oClient,setOClient,oGstin,setOGstin,oStatus,setOStatus,oItems,oTotal,oMrp,oDisc,oTaxable,oGst,gstBreak,filtP,catF,setCatF,pSearch,setPSearch,CATS,addItem,updItem,remItem,saveOrder,setOMode,fmt,fmtI,baseP,gstAmt}),
      tab==="Cash & Cheques"&&h(CashCheques,{data,fmtI,sColor}),
      tab==="Damages & Returns"&&h(DamagesReturns,{data,setData,fmtI}),
      tab==="GPS Tracker"&&h(GpsTracker,{data}),
      tab==="AI Insights"&&h(AiInsights,{aiChat,aiInput,setAiInput,aiLoading,sendAi,chatRef})
    )
  );
}

function Dashboard({data,totOrd,totCash,totCheq,totDmg,totRet,colRate,pct,fmtI}){
  return h("div",null,
    h("div",{style:{marginBottom:20}},
      h("div",{style:{fontSize:13,color:"#64748b",marginBottom:4}},"Monthly Target Progress"),
      h("div",{style:{background:"#1e2a4a",borderRadius:8,height:10,overflow:"hidden"}},
        h("div",{style:{width:pct+"%",height:"100%",background:pct>=80?"linear-gradient(90deg,#22c55e,#4ade80)":pct>=50?"linear-gradient(90deg,#f59e0b,#fbbf24)":"linear-gradient(90deg,#ef4444,#f87171)"}})
      ),
      h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:12,color:"#94a3b8"}},
        h("span",null,fmtI(data.targets.collected)+" collected"),
        h("span",{style:{color:pct>=80?"#22c55e":"#f59e0b",fontWeight:700}},pct+"% of "+fmtI(data.targets.monthly))
      )
    ),
    h("div",{className:"grid2",style:{marginBottom:16}},
      [{label:"Total Orders",value:fmtI(totOrd),sub:data.orders.length+" orders",icon:"🛒",color:"#6366f1"},
       {label:"Cash Collected",value:fmtI(totCash),sub:data.cash.length+" transactions",icon:"💵",color:"#22c55e"},
       {label:"Cheques",value:fmtI(totCheq),sub:data.cheques.filter(c=>c.status==="pending").length+" pending",icon:"🏦",color:"#3b82f6"},
       {label:"Collection Rate",value:colRate+"%",sub:"vs orders",icon:"📈",color:colRate>=80?"#22c55e":"#f59e0b"},
      ].map(m=>h("div",{key:m.label,className:"stat-card"},
        h("div",{style:{fontSize:20,marginBottom:6}},m.icon),
        h("div",{style:{fontSize:18,fontWeight:700,color:m.color}},m.value),
        h("div",{style:{fontSize:11,color:"#64748b",marginTop:2}},m.label),
        h("div",{style:{fontSize:11,color:"#475569"}},m.sub)
      ))
    ),
    h("div",{className:"grid2"},
      h("div",{className:"card",style:{marginBottom:0}},
        h("div",{style:{fontSize:12,fontWeight:600,color:"#94a3b8",marginBottom:10}},"⚠️ Alerts"),
        data.cash.filter(c=>!c.verified).length>0&&h("div",{style:{fontSize:12,color:"#f59e0b",marginBottom:6}},"• "+data.cash.filter(c=>!c.verified).length+" unverified cash"),
        data.damages.filter(d=>!d.resolved).length>0&&h("div",{style:{fontSize:12,color:"#ef4444",marginBottom:6}},"• "+data.damages.filter(d=>!d.resolved).length+" open damages"),
        data.cheques.filter(c=>c.status==="pending").length>0&&h("div",{style:{fontSize:12,color:"#3b82f6",marginBottom:6}},"• "+data.cheques.filter(c=>c.status==="pending").length+" cheques pending"),
        data.returns.length>0&&h("div",{style:{fontSize:12,color:"#a78bfa"}},"• "+data.returns.length+" returns")
      ),
      h("div",{className:"card",style:{marginBottom:0}},
        h("div",{style:{fontSize:12,fontWeight:600,color:"#94a3b8",marginBottom:10}},"📍 Today's Route"),
        data.gps.slice(0,4).map((g,i)=>h("div",{key:i,style:{display:"flex",gap:8,marginBottom:6}},
          h("div",{style:{fontSize:10,color:"#6366f1",minWidth:36}},g.time),
          h("div",{style:{fontSize:12}},g.loc)
        ))
      )
    )
  );
}

function OrdersList({data,setOMode,setVOrder,fmtI,sColor}){
  return h("div",null,
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      h("div",{style:{fontSize:15,fontWeight:700}},"Orders"),
      h("button",{className:"btn-primary",onClick:()=>setOMode("new")},"+ New Order")
    ),
    data.orders.map(o=>h("div",{key:o.id,className:"card",style:{cursor:"pointer"},onClick:()=>{setVOrder(o);setOMode("view");}},
      h("div",{style:{display:"flex",justifyContent:"space-between"}},
        h("div",null,
          h("div",{style:{fontWeight:600,fontSize:14}},o.client),
          h("div",{style:{fontSize:11,color:"#64748b",marginTop:2}},o.id+" · "+o.date),
          o.items?.length>0&&h("div",{style:{fontSize:11,color:"#475569",marginTop:2}},o.items.length+" items")
        ),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontWeight:700,fontSize:15}},fmtI(o.amount)),
          h("div",{style:{fontSize:11,marginTop:3,color:sColor(o.status),fontWeight:600}},o.status.toUpperCase()),
          o.gstTotal>0&&h("div",{style:{fontSize:10,color:"#64748b"}},"GST incl.")
        )
      )
    ))
  );
}

function OrderView({order,setOMode,fmt,fmtI,sColor,baseP,gstAmt,GST_SLABS}){
  return h("div",null,
    h("button",{className:"btn-ghost",onClick:()=>setOMode(null)},"← Back"),
    h("div",{className:"card"},
      h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:12}},
        h("div",null,
          h("div",{style:{fontWeight:700,fontSize:16}},order.client),
          order.gstin&&h("div",{style:{fontSize:11,color:"#64748b"}},"GSTIN: "+order.gstin),
          h("div",{style:{fontSize:12,color:"#64748b"}},order.id+" · "+order.date)
        ),
        h("div",{style:{textAlign:"right"}},
          h("div",{style:{fontWeight:700,fontSize:18,color:"#6366f1"}},fmtI(order.amount)),
          h("div",{style:{fontSize:11,color:sColor(order.status),fontWeight:600}},order.status.toUpperCase())
        )
      ),
      order.items?.length>0?h("div",null,
        order.items.map((item,i)=>h("div",{key:i,style:{padding:"8px 0",borderBottom:"1px solid #1e2a4a"}},
          h("div",{style:{display:"flex",justifyContent:"space-between"}},
            h("div",null,
              h("div",{style:{fontSize:13,fontWeight:600}},item.name),
              h("div",{style:{fontSize:11,color:"#64748b"}},item.sku+" · GST "+item.gst+"% · MRP "+fmt(item.mrp)+" × "+item.qty)
            ),
            h("div",{style:{textAlign:"right"}},
              h("div",{style:{fontWeight:700}},fmt(item.price*item.qty)),
              h("div",{style:{fontSize:10,color:"#818cf8"}},"GST: "+fmt(gstAmt(item.price,item.gst)*item.qty)),
              item.price<item.mrp&&h("div",{style:{fontSize:10,color:"#22c55e"}},"Disc: "+fmt((item.mrp-item.price)*item.qty))
            )
          )
        )),
        order.gstTotal>0&&h("div",{style:{background:"#0a0f1e",borderRadius:10,padding:12,marginTop:12}},
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"#94a3b8",marginBottom:4}},h("span","Taxable Value"),h("span",fmt(order.taxable||0))),
          h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:12,color:"#818cf8",marginBottom:4}},h("span","Total GST (CGST+SGST)"),h("span",fmt(order.gstTotal||0))),
